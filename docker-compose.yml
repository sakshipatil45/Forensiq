version: '3.8'

services:
  # 1. Reverse Proxy / Ingress Gateway
  nginx:
    image: nginx:1.25-alpine
    container_name: forensiq-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web-frontend
      - api-backend
    networks:
      - forensiq-net
    restart: always

  # 2. Next.js 15 Frontend
  web-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: forensiq-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api/v1
    networks:
      - forensiq-net
    restart: always

  # 3. FastAPI Core API
  api-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: forensiq-api
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:supersecuredbpass123@postgres:5432/forensiq
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=8f3db47f9c8f041b3e8ad6b71f98d023b092f6b8b0fae090f7a08b981f9640ab
      - AI_SERVICE_URL=http://ai-services:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    networks:
      - forensiq-net
    restart: always

  # 4. Celery Worker (Background Integration & Agent Executor)
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: forensiq-worker
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:supersecuredbpass123@postgres:5432/forensiq
      - REDIS_URL=redis://redis:6379/0
      - AI_SERVICE_URL=http://ai-services:8001
      - VIRUSTOTAL_API_KEY=mock_vt_key
      - ABUSEIPDB_API_KEY=mock_abuse_key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-services:
        condition: service_started
    networks:
      - forensiq-net
    restart: always

  # 5. LangGraph AI Microservice
  ai-services:
    build:
      context: ./ai-services
      dockerfile: Dockerfile
    container_name: forensiq-ai-service
    environment:
      - LLM_PROVIDER=ollama
      - LLM_MODEL=llama3
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    networks:
      - forensiq-net
    restart: always

  # 6. Relational Database (PostgreSQL 16)
  postgres:
    image: postgres:16-alpine
    container_name: forensiq-postgres
    environment:
      - POSTGRES_DB=forensiq
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=supersecuredbpass123
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - forensiq-net
    restart: always

  # 7. pgAdmin UI Console
  pgadmin:
    image: dpage/pgadmin4:8.0
    container_name: forensiq-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=pgadmin4@forensiq.local
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - forensiq-net
    restart: always

  # 8. Caching & Message Broker (Redis 7)
  redis:
    image: redis:7-alpine
    container_name: forensiq-redis
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - forensiq-net
    restart: always

networks:
  forensiq-net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
